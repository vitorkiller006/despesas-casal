<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Despesas do Casal</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome for Icons -->
    <title>Despesas Casal - Dashboard</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>!-- Nosso CSS e JS -->
    <link rel="stylesheet" href="style.css?v=7">
</head>
<body>
    <div class="app-container" id="app-container">
        
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2><i class="fa-solid fa-wallet"></i> Controle</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="javascript:void(0)" class="active" id="nav-dashboard" onclick="switchView('view-dashboard', this)"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
                <a href="javascript:void(0)" id="nav-receitas" onclick="switchView('view-receitas', this)"><i class="fa-solid fa-arrow-trend-up"></i> Ganhos do Mês</a>
                <a href="javascript:void(0)" id="nav-cartoes" onclick="switchView('view-cartoes', this)"><i class="fa-solid fa-credit-card"></i> Cartões</a>
                <a href="javascript:void(0)" id="nav-reservas" onclick="switchView('view-reservas', this)"><i class="fa-solid fa-piggy-bank"></i> Reservas</a>
                <a href="javascript:void(0)" id="nav-add" onclick="switchView('view-add', this)"><i class="fa-solid fa-plus"></i> Lançar Despesa</a>
            </nav>
            <div class="sidebar-footer">
                <p>Nossas Despesas ♥</p>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            
            <header class="top-header">
                <div class="header-titles">
                    <h1 id="page-title">Dashboard</h1>
                    <p class="subtitle" id="page-subtitle">Resumo dos nossos gastos deste mês</p>
                </div>
                <div class="user-profile">
                    <div class="avatar">
                        <i class="fa-solid fa-user-group"></i>
                    </div>
                </div>
            </header>

            <!-- DASHBOARD VIEW -->
            <div id="view-dashboard" class="view-section active">
            <h2 style="margin-bottom: 20px;"><i class="fa-solid fa-chart-pie"></i> Visão Geral</h2>

            <div style="margin-bottom: 20px; display: flex; align-items: center; gap: 10px; background: var(--card-bg); padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px var(--shadow-color);">
                <label for="mes-filtro" style="margin: 0; font-weight: bold; color: var(--text-primary);"><i class="fa-regular fa-calendar"></i> Referência:</label>
                <input type="month" id="mes-filtro" style="flex: 1; margin: 0; background: var(--bg-color); color: var(--text-primary); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 10px; font-family: inherit;">
            </div>

            <div class="dashboard-grid">
                    <p style="color: var(--text-secondary)">Resumo do mês atual</p>
                </div>

                <div class="dashboard-grid">
                    <div class="summary-cards" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; width: 100%;">
                        
                        <div class="card summary-card" style="border-left: 4px solid var(--accent-green); display: flex; align-items: center; gap: 15px;">
                            <div style="background: rgba(46, 213, 115, 0.1); color: var(--accent-green); padding: 15px; border-radius: 12px; font-size: 1.5rem;"><i class="fa-solid fa-arrow-trend-up"></i></div>
                            <div>
                                <p style="font-size: 0.9rem; color: var(--text-secondary);">Ganhos do Mês</p>
                                <h2 id="total-ganhos">R$ 0,00</h2>
                            </div>
                        </div>

                        <div class="card summary-card" style="border-left: 4px solid var(--accent-red); display: flex; align-items: center; gap: 15px;">
                            <div style="background: rgba(255, 71, 87, 0.1); color: var(--accent-red); padding: 15px; border-radius: 12px; font-size: 1.5rem;"><i class="fa-solid fa-money-bill-wave"></i></div>
                            <div>
                                <p style="font-size: 0.9rem; color: var(--text-secondary);">Gastos do Mês</p>
                                <h2 id="total-gasto">R$ 0,00</h2>
                            </div>
                        </div>

                        <div class="card summary-card" style="border-left: 4px solid var(--accent-blue); display: flex; align-items: center; gap: 15px;">
                            <div style="background: rgba(30, 144, 255, 0.1); color: var(--accent-blue); padding: 15px; border-radius: 12px; font-size: 1.5rem;"><i class="fa-solid fa-scale-balanced"></i></div>
                            <div>
                                <p style="font-size: 0.9rem; color: var(--text-secondary);">Saldo do Mês</p>
                                <h2 id="saldo-mes">R$ 0,00</h2>
                            </div>
                        </div>

                        <div class="card summary-card" style="border-left: 4px solid var(--accent-purple); display: flex; align-items: center; gap: 15px;">
                            <div style="background: rgba(162, 155, 254, 0.1); color: var(--accent-purple); padding: 15px; border-radius: 12px; font-size: 1.5rem;"><i class="fa-solid fa-piggy-bank"></i></div>
                            <div>
                                <p style="font-size: 0.9rem; color: var(--text-secondary);">Total Guardado</p>
                                <h2 id="total-guardado">R$ 0,00</h2>
                            </div>
                        </div>

                    </div>
                </div>
                <div class="dashboard-grid" style="margin-top: 20px;">
                    <div class="card" style="grid-column: span 1;">
                        <h3>Despesas por Categoria</h3>
                        <div style="position: relative; height: 250px; margin-top: 15px;">
                            <canvas id="gastosChart"></canvas>
                        </div>
                    </div>
                    <div class="card" style="grid-column: span 1;">
                        <h3>Balanço do Mês</h3>
                        <div style="position: relative; height: 250px; margin-top: 15px;">
                            <canvas id="balancoChart"></canvas>
                        </div>
                    </div>
                </div>

                <!-- Recent Expenses Table -->
                <div class="card recent-expenses">
                    <div class="card-header">
                        <h3>Últimas Despesas</h3>
                        <button class="btn-sm btn-primary" onclick="switchView('view-add', document.getElementById('nav-add'))">Adicionar</button>
                    </div>
                    <div class="table-responsive">
                        <table class="expenses-table">
                            <thead>
                                <tr>
                                    <th>Data</th>
                                    <th>Descrição</th>
                                    <th>Categoria</th>
                                    <th>Valor</th>
                                    <th style="width: 50px;"></th>
                                </tr>
                            </thead>
                            <tbody id="expenses-tbody">
                                <!-- Preenchido dinamicamente via JS -->
                                <tr><td colspan="5" class="loading-td">Aguardando conexão com Supabase...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- ADD EXPENSE VIEW -->
            <section id="view-add" class="view-section">
                <div class="card form-card">
                    <h3>Registrar Nova Despesa</h3>
                    <form id="expense-form">
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="descricao">Descrição (O que compramos?)</label>
                                <input type="text" id="descricao" required placeholder="Ex: Compra no Assaí">
                            </div>
                            
                            <div class="form-group">
                                <label for="valor">Valor (R$)</label>
                                <input type="number" id="valor" step="0.01" required placeholder="0.00">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="categoria">Categoria</label>
                                <select id="categoria" required>
                                    <option value="" disabled selected>Selecione...</option>
                                    <option value="Mercado">🛒 Mercado</option>
                                    <option value="Lazer">🍿 Lazer & Saídas</option>
                                    <option value="Streamings">📺 Streamings</option>
                                    <option value="Contas">📄 Contas da Casa</option>
                                    <option value="Transporte">🚗 Transporte</option>
                                    <option value="Saúde">💊 Saúde & Farmácia</option>
                                    <option value="Pets">🐶 Pets</option>
                                    <option value="Serviços">🛠️ Serviços</option>
                                    <option value="Educação">📚 Educação</option>
                                    <option value="Compras de Internet">🌐 Compras de Internet</option>
                                    <option value="Financiamento">🏦 Financiamento</option>
                                    <option value="Impostos">📝 Impostos</option>
                                    <option value="Academia">🏋️ Academia</option>
                                    <option value="Outros">📦 Outros</option>
                                </select>
                            </div>
                            
                            <div class="form-group">
                                <label for="data">Data da Compra</label>
                                <input type="date" id="data" required>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="forma_pagamento">Forma de Pagamento</label>
                                <select id="forma_pagamento" required>
                                    <option value="Pix">Pix</option>
                                    <option value="Cartão de Crédito">Cartão de Crédito</option>
                                    <option value="Cartão de Débito">Cartão de Débito</option>
                                    <option value="Boleto">Boleto</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="banco">Banco / Instituição</label>
                                <select id="banco" required>
                                    <option value="Nubank">Nubank</option>
                                    <option value="Banco do Brasil">Banco do Brasil</option>
                                    <option value="Itaú">Itaú</option>
                                    <option value="Caixa">Caixa Econômica</option>
                                    <option value="Inter">Inter</option>
                                    <option value="Santander">Santander</option>
                                    <option value="Outro">Outro</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="parcelas">Qtd. Parcelas</label>
                                <input type="number" id="parcelas" min="1" max="60" value="1" required>
                            </div>
                            <div class="form-group" style="display: flex; align-items: center; gap: 10px; margin-top: 25px;">
                                <input type="checkbox" id="recorrente" style="width: 20px; height: 20px; cursor: pointer;">
                                <label for="recorrente" style="margin: 0; cursor: pointer;">Despesa Fixa / Recorrente (Todo Mês)</label>
                            </div>
                        </div>

                        <div class="form-actions">
                            <button type="button" class="btn btn-secondary" onclick="switchView('view-dashboard', document.getElementById('nav-dashboard'))">Cancelar</button>
                            <button type="submit" class="btn btn-primary" id="btn-submit">
                                <i class="fa-solid fa-check"></i> Salvar Despesa
                            </button>
                        </div>
                    </form>
                </div>
            </section>

            <!-- VIEW RECEITAS -->
            <section id="view-receitas" class="view-section">
                <div class="card form-card">
                    <h3>Registrar Ganho / Receita</h3>
                    <form id="receita-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="rec-descricao">Descrição (Ex: Salário, Rendimento)</label>
                                <input type="text" id="rec-descricao" required placeholder="Salário do mês">
                            </div>
                            <div class="form-group">
                                <label for="rec-valor">Valor (R$)</label>
                                <input type="number" id="rec-valor" step="0.01" required placeholder="0.00">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="rec-banco">Onde Recebeu?</label>
                                <select id="rec-banco" required>
                                    <option value="Nubank">Nubank</option>
                                    <option value="Banco do Brasil">Banco do Brasil</option>
                                    <option value="Itaú">Itaú</option>
                                    <option value="Caixa">Caixa Econômica</option>
                                    <option value="Inter">Inter</option>
                                    <option value="Santander">Santander</option>
                                    <option value="Outro">Outro</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="rec-data">Data</label>
                                <input type="date" id="rec-data" required>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group" style="display: flex; align-items: center; gap: 10px; margin-top: 10px;">
                                <input type="checkbox" id="rec-fixa" style="width: 20px; height: 20px; cursor: pointer;">
                                <label for="rec-fixa" style="margin: 0; cursor: pointer;">Ganho Fixo (Repetir nos próximos 12 meses)</label>
                            </div>
                        </div>
                        <div class="form-actions" style="justify-content: flex-end;">
                            <button type="submit" class="btn btn-primary" id="btn-submit-rec" style="background: var(--accent-green);">
                                <i class="fa-solid fa-check"></i> Salvar Ganho
                            </button>
                        </div>
                    </form>
                </div>

                <div class="card">
                    <h3>Ganhos Lançados</h3>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Data</th>
                                    <th>Descrição</th>
                                    <th>Onde</th>
                                    <th>Valor</th>
                                    <th style="width: 50px;"></th>
                                </tr>
                            </thead>
                            <tbody id="receitas-tbody">
                                <tr><td colspan="5" class="loading-td">Carregando...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>

            <!-- VIEW CARTOES -->
            <section id="view-cartoes" class="view-section">
                <div class="card form-card">
                    <h3>Cadastrar Cartão de Crédito</h3>
                    <form id="cartao-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="car-banco">Instituição</label>
                                <select id="car-banco" required>
                                    <option value="Nubank">Nubank</option>
                                    <option value="Banco do Brasil">Banco do Brasil</option>
                                    <option value="Itaú">Itaú</option>
                                    <option value="Caixa">Caixa Econômica</option>
                                    <option value="Inter">Inter</option>
                                    <option value="Santander">Santander</option>
                                    <option value="Outro">Outro</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="car-nome">Nome (Ex: Cartão Roxinho)</label>
                                <input type="text" id="car-nome" required>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="car-vencimento">Dia de Vencimento</label>
                                <input type="number" id="car-vencimento" min="1" max="31" required>
                            </div>
                            <div class="form-group">
                                <label for="car-fechamento">Dia de Fechamento</label>
                                <input type="number" id="car-fechamento" min="1" max="31">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="car-limite">Limite (Opcional R$)</label>
                                <input type="number" id="car-limite" step="0.01">
                            </div>
                        </div>
                        <div class="form-actions" style="justify-content: flex-end;">
                            <button type="submit" class="btn btn-primary" id="btn-submit-car">
                                <i class="fa-solid fa-plus"></i> Adicionar Cartão
                            </button>
                        </div>
                    </form>
                </div>
                
                <h3 style="margin: 20px 0 10px 0;">Meus Cartões</h3>
                <div id="cartoes-container" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px;">
                    <!-- Cartões Aqui -->
                </div>
            </section>

            <!-- VIEW RESERVAS -->
            <section id="view-reservas" class="view-section">
                <div class="card form-card">
                    <h3>Cadastrar Caixinha / Investimento</h3>
                    <form id="reserva-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="res-nome">Nome (Ex: Viagem, Casa)</label>
                                <input type="text" id="res-nome" required>
                            </div>
                            <div class="form-group">
                                <label for="res-banco">Onde está guardado?</label>
                                <select id="res-banco" required>
                                    <option value="Nubank">Nubank</option>
                                    <option value="Banco do Brasil">Banco do Brasil</option>
                                    <option value="Itaú">Itaú</option>
                                    <option value="Caixa">Caixa Econômica</option>
                                    <option value="Inter">Inter</option>
                                    <option value="XP">XP Investimentos</option>
                                    <option value="Rico">Rico</option>
                                    <option value="Outro">Outro</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="res-saldo">Saldo Atual (R$)</label>
                                <input type="number" id="res-saldo" step="0.01" required>
                            </div>
                        </div>
                        <div class="form-actions" style="justify-content: flex-end;">
                            <button type="submit" class="btn btn-primary" id="btn-submit-res" style="background: var(--accent-purple);">
                                <i class="fa-solid fa-piggy-bank"></i> Criar Reserva
                            </button>
                        </div>
                    </form>
                </div>
                
                <h3 style="margin: 20px 0 10px 0;">Nossas Reservas</h3>
                <div id="reservas-container" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-bottom: 30px;">
                    <!-- Reservas Aqui -->
                </div>

                <div class="card" style="margin-top: 20px;">
                    <h3>Evolução Patrimonial</h3>
                    <canvas id="reservasChart" style="max-height: 300px; margin-top: 15px;"></canvas>
                </div>
            </section>

        </main>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="toast">Despesa salva com sucesso!</div>

    <script>
        // O código javascript agora fica direto no HTML para evitar 100% os problemas de cache
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            alert("Erro JS Crítico: " + msg + " na linha " + lineNo);
            return false;
        };

        const SUPABASE_URL = 'https://mmvieranrinduaxlgjua.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1tdmllcmFucmluZHVheGxnanVhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1MzQxMTAsImV4cCI6MjA5ODExMDExMH0.qR1XZYpmvWEaA-PhCBJg06PJodhqu4U5XI_SM2gsPz8';

        let supabaseClient = null;
        try {
            if (window.supabase) {
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            }
        } catch (e) {
            alert("Erro ao conectar no banco: " + e.message);
        }

        window.switchView = function(viewId, navElement) {
            try {
                document.querySelectorAll('.view-section').forEach(sec => {
                    sec.classList.remove('active');
                });
                const target = document.getElementById(viewId);
                if(target) target.classList.add('active');

                if (navElement) {
                    document.querySelectorAll('.sidebar-nav a').forEach(a => a.classList.remove('active'));
                    navElement.classList.add('active');
                }

                if (viewId === 'view-dashboard') {
                    carregarDashboard();
                } else if (viewId === 'view-receitas') {
                    carregarReceitas();
                } else if (viewId === 'view-cartoes') {
                    carregarCartoes();
                } else if (viewId === 'view-reservas') {
                    carregarReservas();
                } else if (viewId === 'view-despesas') { // caso a gente crie uma no futuro
                    carregarDespesas();
                }
            } catch (e) {
                alert("Erro ao mudar de tela: " + e.message);
            }
        }

        const formatter = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' });
        function formatData(dataISO) {
            if (!dataISO) return '--/--/----';
            const [ano, mes, dia] = dataISO.split('T')[0].split('-');
            return `${dia}/${mes}/${ano}`;
        }

        function mostrarToast() {
            const toast = document.getElementById('toast');
            if(toast) {
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 3000);
            }
        }

        // Variáveis globais dos gráficos
        let gastosChartInstance = null;
        let balancoChartInstance = null;
        let reservasChartInstance = null;

        async function carregarDashboard() {
            if (!supabaseClient) return;
            try {
                const filtroVal = document.getElementById('mes-filtro').value; // YYYY-MM
                if (!filtroVal) return;
                const [anoStr, mesStr] = filtroVal.split('-');
                const ano = parseInt(anoStr);
                const mes = parseInt(mesStr) - 1;

                const primeiroDia = new Date(ano, mes, 1).toISOString().split('T')[0];
                const ultimoDia = new Date(ano, mes + 1, 0).toISOString().split('T')[0];

                const { data: despMes } = await supabaseClient.from('despesas').select('valor, categoria').gte('data', primeiroDia).lte('data', ultimoDia);
                const { data: recMes } = await supabaseClient.from('receitas').select('valor').gte('data', primeiroDia).lte('data', ultimoDia);
                const { data: resTotais } = await supabaseClient.from('reservas').select('saldo');

                let gastosMes = despMes ? despMes.reduce((acc, curr) => acc + Number(curr.valor), 0) : 0;
                let ganhosMes = recMes ? recMes.reduce((acc, curr) => acc + Number(curr.valor), 0) : 0;
                let saldoMes = ganhosMes - gastosMes;
                let guardadoTotal = resTotais ? resTotais.reduce((acc, curr) => acc + Number(curr.saldo), 0) : 0;

                document.getElementById('total-gasto').innerText = formatter.format(gastosMes);
                document.getElementById('total-ganhos').innerText = formatter.format(ganhosMes);
                document.getElementById('saldo-mes').innerText = formatter.format(saldoMes);
                document.getElementById('total-guardado').innerText = formatter.format(guardadoTotal);
                
                // Colorir o saldo
                document.getElementById('saldo-mes').style.color = saldoMes < 0 ? 'var(--accent-red)' : 'var(--accent-green)';

                // --- Gráficos ---
                const categoriasDict = {};
                if (despMes) {
                    despMes.forEach(d => {
                        const cat = d.categoria || 'Outros';
                        categoriasDict[cat] = (categoriasDict[cat] || 0) + Number(d.valor);
                    });
                }
                const catLabels = Object.keys(categoriasDict);
                const catData = Object.values(categoriasDict);

                if (gastosChartInstance) gastosChartInstance.destroy();
                if (balancoChartInstance) balancoChartInstance.destroy();

                const ctxGastos = document.getElementById('gastosChart');
                if (ctxGastos) {
                    gastosChartInstance = new Chart(ctxGastos.getContext('2d'), {

        async function carregarDespesas() {
            const tbody = document.getElementById('expenses-tbody');
            if (!supabaseClient) {
                tbody.innerHTML = '<tr><td colspan="5" class="loading-td">Sistema Offline. Verifique sua conexão.</td></tr>';

                const mes = parseInt(mesStr) - 1;

                const primeiroDia = new Date(ano, mes, 1).toISOString().split('T')[0];
                const ultimoDia = new Date(ano, mes + 1, 0).toISOString().split('T')[0];

                const { data: despesas, error } = await supabaseClient
                    .from('despesas')
                    .select('*')
                    .gte('data', primeiroDia)
                    .lte('data', ultimoDia)
                    .order('data', { ascending: false });

                if (error) throw error;

                let html = '';

                if (!despesas || despesas.length === 0) {
                    html = '<tr><td colspan="5" class="loading-td">Nenhuma despesa lançada ainda!</td></tr>';

                    despesas.forEach(d => {
                        html += `
                            <tr>
                                <td>
                                    <strong>${formatData(d.data)}</strong>
                                    ${d.data_compra && d.data_compra !== d.data ? `<br><small style="color: var(--text-secondary); font-size: 0.75rem;">(Comprado em ${formatData(d.data_compra)})</small>` : ''}
                                </td>
                                <td>
                                    ${d.descricao}
                                    <div style="font-size: 0.75rem; color: var(--text-secondary); margin-top: 4px;">
                                        ${d.forma_pagamento ? `<i class="fa-solid fa-wallet"></i> ${d.forma_pagamento} ` : ''}
                                        ${d.banco ? `| <i class="fa-solid fa-building-columns"></i> ${d.banco}` : ''}
                                    </div>
                                </td>
                                <td><span style="background: rgba(255,255,255,0.1); padding: 4px 8px; border-radius: 6px; font-size: 0.8rem;">${d.categoria}</span></td>
                                <td class="val-negative">${formatter.format(d.valor)}</td>
                                <td>
                                    <button onclick="editarDespesa('${d.id}')" style="background: transparent; border: none; color: var(--accent-blue); cursor: pointer; font-size: 1.1rem; padding: 5px; margin-right: 5px;">
                                        <i class="fa-solid fa-pen-to-square"></i>
                                    </button>
                                    <button onclick="deletarDespesa('${d.id}')" style="background: transparent; border: none; color: var(--accent-red); cursor: pointer; font-size: 1.1rem; padding: 5px;">
                                        <i class="fa-solid fa-trash-can"></i>
                                    </button>
                                </td>
                            </tr>
                        `;
                    });
                }
                tbody.innerHTML = html;
            } catch (err) {
                tbody.innerHTML = '<tr><td colspan="5" class="loading-td" style="color: red">Falha ao baixar dados.</td></tr>';
                alert("Falha na sincronização: " + err.message);
            }

        let cartoesCadastrados = [];
        let editandoDespesaId = null;

        document.getElementById('forma_pagamento').addEventListener('change', (e) => {
            const bancoSelect = document.getElementById('banco');
            if (e.target.value.includes('Cartão')) {

        document.getElementById('expense-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!supabaseClient) return;

            const descricao = document.getElementById('descricao').value;
            const valorTotal = parseFloat(document.getElementById('valor').value);
            const categoria = document.getElementById('categoria').value;
            const dataStr = document.getElementById('data').value;
            const forma_pagamento = document.getElementById('forma_pagamento').value;
            const banco = document.getElementById('banco').value;
            let parcelas = parseInt(document.getElementById('parcelas').value);
            const isRecorrente = document.getElementById('recorrente').checked;

            if (isRecorrente) {
                parcelas = 6; // Lança a despesa recorrente por 6 meses pra frente
            }

            const btnSubmit = document.getElementById('btn-submit');
            btnSubmit.innerHTML = 'Processando...';
            btnSubmit.disabled = true;

            try {
                let dataCompraBase = new Date(dataStr + 'T12:00:00');
                let dataPrimeiroPagamento = new Date(dataCompraBase);

                if (forma_pagamento === 'Cartão de Crédito') {
                    const cartao = cartoesCadastrados.find(c => c.nome === banco);
                    if (cartao && cartao.dia_vencimento) {
                        let diaFechamento = cartao.dia_fechamento || (cartao.dia_vencimento - 7); 
                        if (diaFechamento <= 0) diaFechamento += 30;

                        let diaCompra = dataCompraBase.getDate();
                        let mesCompra = dataCompraBase.getMonth();
                        let anoCompra = dataCompraBase.getFullYear();

                        let basePagamento = new Date(anoCompra, mesCompra, cartao.dia_vencimento, 12, 0, 0);

                        if (cartao.dia_vencimento < diaFechamento) {
                            basePagamento.setMonth(basePagamento.getMonth() + 1);
                        }

                        if (diaCompra >= diaFechamento) {
                            basePagamento.setMonth(basePagamento.getMonth() + 1);
                        }

                        while (basePagamento < dataCompraBase) {
                            basePagamento.setMonth(basePagamento.getMonth() + 1);
                        }

                        dataPrimeiroPagamento = basePagamento;
                    }
                }

                if (editandoDespesaId) {
                    let yEdit = dataPrimeiroPagamento.getFullYear();
                    let mEdit = String(dataPrimeiroPagamento.getMonth() + 1).padStart(2, '0');
                    let dEdit = String(dataPrimeiroPagamento.getDate()).padStart(2, '0');

                    // Modo de edição: atualiza apenas uma despesa (ignora criação de múltiplas parcelas novas)
                    const { error } = await supabaseClient.from('despesas').update({
                        descricao, valor: valorTotal, categoria, data: `${yEdit}-${mEdit}-${dEdit}`, data_compra: dataStr, banco, forma_pagamento
                    }).match({ id: editandoDespesaId });
                    
                    if (error) throw error;
                    editandoDespesaId = null; // reseta
                } else {
                    // Modo de criação: cria múltiplas se tiver parcelas ou for recorrente
                    const inserts = [];
                    const valorParcela = isRecorrente ? valorTotal : (valorTotal / parcelas);

                    for (let i = 0; i < parcelas; i++) {
                        let desc = descricao;
                        if (!isRecorrente && parcelas > 1) {
                            desc = `${descricao} (Parc. ${i+1}/${parcelas})`;
                        } else if (isRecorrente) {
                            desc = `${descricao}`; // Mantem igual, ou pode colocar (Recorrente)
                        }
                        
                        let novaDataPagamento = new Date(dataPrimeiroPagamento);
                        novaDataPagamento.setMonth(novaDataPagamento.getMonth() + i);
                        let yp = novaDataPagamento.getFullYear();
                        let mp = String(novaDataPagamento.getMonth() + 1).padStart(2, '0');
                        let dp = String(novaDataPagamento.getDate()).padStart(2, '0');
                        
                        inserts.push({
                            descricao: desc, valor: valorParcela, categoria: categoria, data: `${yp}-${mp}-${dp}`, data_compra: dataStr,
                            banco: banco, forma_pagamento: forma_pagamento, parcelas: String(parcelas), num_parcela: String(i+1)
                        });
                    }
                    const { error } = await supabaseClient.from('despesas').insert(inserts);
                    if (error) throw error;
                }

                document.getElementById('expense-form').reset();
                document.getElementById('parcelas').disabled = false;
                document.getElementById('recorrente').disabled = false;
                // Reseta a lista de bancos para o padrão
                document.getElementById('forma_pagamento').dispatchEvent(new Event('change'));
                
                mostrarToast();
                switchView('view-dashboard', document.getElementById('nav-dashboard'));
            } catch (err) {
                alert('Erro na hora de salvar: ' + err.message);
            } finally {
                btnSubmit.innerHTML = '<i class="fa-solid fa-check"></i> Salvar Despesa';
                btnSubmit.disabled = false;
            }
        });

                    let html = '';

                                    <strong style="font-size: 1.5rem;">${formatter.format(r.saldo)}</strong>
                                </div>
                                <button onclick="editarSaldoReserva('${r.id}', ${r.saldo})" style="margin-top: 15px; width: 100%; background: rgba(0,0,0,0.2); border: none; color: ${textColor}; padding: 8px; border-radius: 6px; cursor: pointer;">Atualizar Saldo do Mês</button>
                            </div>
                        `;
                    });
                    container.innerHTML = html;

                    // Montar Gráfico de Evolução Patrimonial
                    if (reservasChartInstance) reservasChartInstance.destroy();
                    const { data: historico } = await supabaseClient.from('historico_reservas').select('*').order('data_registro', { ascending: true });
                    
                    if (historico && historico.length > 0) {
                        const allDates = [...new Set(historico.map(h => h.data_registro))].sort();
                        const datasets = [];
                        const cores = ['#8b5cf6', '#f59e0b', '#3b82f6', '#10b981', '#ef4444', '#ec4899'];
                        let corIdx = 0;

                        reservas.forEach(r => {
                            const histReserva = historico.filter(h => h.reserva_id === r.id);
                            if (histReserva.length > 0) {
                                const dataPoints = [];
                                let lastVal = 0; // Se não tinha no mês, assume o valor anterior (ou 0 no inicio)
                                allDates.forEach(d => {
                                    // pega a última atualização daquele dia
                                    const updatesDoDia = histReserva.filter(x => x.data_registro === d);
                                    if (updatesDoDia.length > 0) {
                                        lastVal = updatesDoDia[updatesDoDia.length - 1].saldo;
                                    }
                                    dataPoints.push(lastVal);
                                });
                                
                                datasets.push({
                                    label: r.nome,
                                    data: dataPoints,
                                    borderColor: cores[corIdx % cores.length],
                                    backgroundColor: cores[corIdx % cores.length],
                                    tension: 0.3
                                });
                                corIdx++;
                            }
                        });

                        const ctxRes = document.getElementById('reservasChart');
                        if (ctxRes) {
                            reservasChartInstance = new Chart(ctxRes.getContext('2d'), {
                                type: 'line',
                                data: { labels: allDates.map(d => formatData(d)), datasets: datasets },

                                    scales: {

                                        y: { ticks: { color: '#e2e8f0' }, grid: { color: 'rgba(255,255,255,0.1)' } }
                                    },
                                    plugins: { legend: { labels: { color: '#e2e8f0' } } }
                                }
                            });
                        }
                    }
                }
            } catch (err) { alert(err.message); }
        }

        window.deletarReserva = async function(id) {
            if (!confirm("Apagar esta reserva?")) return;
            try {
                await supabaseClient.from('reservas').delete().match({ id: id });
                carregarReservas();
            } catch (err) {}
        };

        window.editarSaldoReserva = async function(id, saldoAtual) {
            const novoSaldoStr = prompt("Qual o novo saldo atual da caixinha (em R$)?", saldoAtual);
            if(novoSaldoStr === null) return;
            const novoSaldo = parseFloat(novoSaldoStr.replace(',', '.'));
            if(isNaN(novoSaldo)) { alert("Valor numérico inválido!"); return; }
            try {
                await supabaseClient.from('reservas').update({ saldo: novoSaldo }).match({ id: id });
                const dataHoje = new Date().toISOString().split('T')[0];
                await supabaseClient.from('historico_reservas').insert([{ reserva_id: id, saldo: novoSaldo, data_registro: dataHoje }]);
                carregarReservas();
            } catch (err) { alert(err.message); }
        };

        document.getElementById('reserva-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-submit-res');
            btn.disabled = true;
            try {
                const banco = document.getElementById('res-banco').value;
                const nome = document.getElementById('res-nome').value;
                const saldo = parseFloat(document.getElementById('res-saldo').value);
                
                const { data, error } = await supabaseClient.from('reservas').insert([{ banco, nome, saldo }]).select();
                if (error) throw error;
                
                if (data && data.length > 0) {
                    const dataHoje = new Date().toISOString().split('T')[0];
                    await supabaseClient.from('historico_reservas').insert([{ reserva_id: data[0].id, saldo: saldo, data_registro: dataHoje }]);
                }
                
                document.getElementById('reserva-form').reset();
                mostrarToast();
                carregarReservas();
            } catch (err) { alert(err.message); } finally { btn.disabled = false; }
        });

        // Initialize Dashboard Filter to current month
        const hojeFilter = new Date();
        document.getElementById('mes-filtro').value = `${hojeFilter.getFullYear()}-${String(hojeFilter.getMonth() + 1).padStart(2, '0')}`;
        document.getElementById('mes-filtro').addEventListener('change', carregarDashboard);

        // Força a chamada imediata na aba inicial
        carregarDashboard();
        carregarCartoes(); // Popula silenciosamente os cartoes globais para o formulário de despesas
    </script>
</body>
</html>
